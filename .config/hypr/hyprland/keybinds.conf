plugin {
    split-monitor-workspaces {
        count = 10
        keep_focused = 0
        enable_notifications = 0
        enable_persistent_workspaces = 1
    }
}

$mainMod = SUPER # Sets "Windows" key as main modifier
$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun

# Switch workspaces with mainMod + [0-9] - Requires split-monitor-workspaces plugin
bind = $mainMod, 1, split-workspace, 1
bind = $mainMod, 2, split-workspace, 2
bind = $mainMod, 3, split-workspace, 3
bind = $mainMod, 4, split-workspace, 4
bind = $mainMod, 5, split-workspace, 5
bind = $mainMod, 6, split-workspace, 6
bind = $mainMod, 7, split-workspace, 7
bind = $mainMod, 8, split-workspace, 8
bind = $mainMod, 9, split-workspace, 9
bind = $mainMod, 0, split-workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9] - Requires split-monitor-workspaces plugin
bind = $mainMod SHIFT, 1, split-movetoworkspace, 1
bind = $mainMod SHIFT, 2, split-movetoworkspace, 2
bind = $mainMod SHIFT, 3, split-movetoworkspace, 3
bind = $mainMod SHIFT, 4, split-movetoworkspace, 4
bind = $mainMod SHIFT, 5, split-movetoworkspace, 5
bind = $mainMod SHIFT, 6, split-movetoworkspace, 6
bind = $mainMod SHIFT, 7, split-movetoworkspace, 7
bind = $mainMod SHIFT, 8, split-movetoworkspace, 8
bind = $mainMod SHIFT, 9, split-movetoworkspace, 9
bind = $mainMod SHIFT, 0, split-movetoworkspace, 10

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bindd = $mainMod, T, Opens Terminal, exec, $terminal
bindd = $mainMod, Q, Closes Active Window, killactive,
bindd = $mainMod, E, Opens File Explorer, exec, $fileManager
bindd = $mainMod, V, Makes Active Window Foalt, togglefloating,
bindd = $mainMod, R, Opens App Launcher, exec, $menu
#bindd = $mainMod, J, , togglesplit, # dwindle
bindd = $mainMod, L, Locks Computer, exec, hyprlock
bindd = $mainMod, P, Opens Display Manager (nwg-displays), exec, nwg-displays
bindd = Ctrl+Alt, W, Restarts bar & wallpaper, exec, killall waybar && killall wpaperd || waybar && wpaperd # toggle waybar
bindd = Ctrl + Alt, left, Previous Wallpaper, exec, wpaperctl previous-wallpaper
bindd = Ctrl + Alt, right, Next wallpaper, exec, wpaperctl next-wallpaper
bindd = Ctrl + Alt, Delete, wlogout, exec, wlogout

bind = , print, exec, grim $(xdg-user-dir PICTURES)/Screenshots/$(date +'%s_grim.png')
bind = CTRL, print, exec, grim -g "$(slurp -o)" $(xdg-user-dir PICTURES)/Screenshots/$(date +'%s_grim.png')
bind = CTRL SHIFT, print, exec, grim -g "$(slurp)" $(xdg-user-dir PICTURES)/Screenshots/$(date +'%s_grim.png'

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Resize
binde = $mainMod+Shift, Right, resizeactive, 30 0
binde = $mainMod+Shift, Left, resizeactive, -30 0
binde = $mainMod+Shift, Up, resizeactive, 0 -30
binde = $mainMod+Shift, Down, resizeactive, 0 30


# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow 

bindel=$mainMod Alt, SPACE, exec, playerctl play-pause
bindel=$mainMod Alt, down, exec, playerctl previous
bindel=$mainMod Alt, left, exec, playerctl position 5-
bindel=$mainMod Alt, up, exec, playerctl next
bindel=$mainMod Alt, right, exec, playerctl position 5+

bindel = ,XF86MonBrightnessDown, exec, hyprctl hyprsunset gamma -10
bindel = ,XF86MonBrightnessUp, exec, hyprctl hyprsunset gamma +10

# Media Control
binddel=, XF86AudioRaiseVolume, Increases volume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binddel=, XF86AudioLowerVolume, Decreases volume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl=, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = ,XF86AudioNext,         exec, playerctl next
bind = ,XF86AudioPrev,         exec, playerctl previous
bind = ,XF86AudioPlay,         exec, playerctl play

# Monitors
bindd = $mainMod, X, Move Window to next nonitor, movewindow, mon:+1
